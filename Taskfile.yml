version: '3'

tasks:

  default:
    cmds:
      - task --list

  run:
    desc: Run the development server
    cmds:
      - task: dev

  dev:
    desc: Run the development server
    cmds:
      - npm run dev

  build:
    desc: Build the project
    cmds:
      - bun run build:win

  test:
    desc: Run tests
    cmds:
      - npm test

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist out build
